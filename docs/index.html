<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Motion Charts Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>Motion Charts Demo</h1>

    <section class="chart-card">
      <h2>Distance vs Time</h2>
      <canvas id="distanceTimeChart"></canvas>
      <div class="controls">
        <button id="toggle-dt">Toggle Distance Graph</button>
      </div>
    </section>

    <section class="chart-card">
      <h2>Velocity vs Time</h2>
      <canvas id="velocityTimeChart"></canvas>
      <div class="controls">
        <button id="toggle-vt">Toggle Velocity Graph</button>
      </div>
    </section>

    <section class="chart-card">
      <h2>Acceleration vs Time</h2>
      <canvas id="accelerationTimeChart"></canvas>
      <div class="controls">
        <button id="toggle-at">Toggle Acceleration Graph</button>
      </div>
    </section>

    <section class="quiz">
      <h2>Quick Quiz</h2>
      <form id="quiz-form">
        <div class="q">
          <p>1. Rate of change of distance with time is called?</p>
          <label><input type="radio" name="q1" value="Speed"> Speed</label>
          <label><input type="radio" name="q1" value="Acceleration"> Acceleration</label>
          <label><input type="radio" name="q1" value="Displacement"> Displacement</label>
        </div>
        <div class="q">
          <p>2. Shortest path between two points is?</p>
          <label><input type="radio" name="q2" value="Distance"> Distance</label>
          <label><input type="radio" name="q2" value="Displacement"> Displacement</label>
          <label><input type="radio" name="q2" value="Speed"> Speed</label>
        </div>
        <div class="q">
          <p>3. If an object is not moving, we say?</p>
          <label><input type="radio" name="q3" value="Object is at rest"> Object is at rest</label>
          <label><input type="radio" name="q3" value="Object is in motion"> Object is in motion</label>
          <label><input type="radio" name="q3" value="Accelerating"> Accelerating</label>
        </div>
        <div class="quiz-actions">
          <button type="button" id="submit-quiz">Submit Quiz</button>
          <div id="quiz-result" class="quiz-result"></div>
        </div>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
